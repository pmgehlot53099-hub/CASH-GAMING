<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASH GAMING - Free Fire Character Battles</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --electric-purple: #8A2BE2;
            --cyan-blue: #00FFFF;
            --dark-bg: #0A0A0F;
            --panel-bg: rgba(10, 10, 15, 0.85);
            --neon-glow-purple: 0 0 20px #8A2BE2, 0 0 40px #8A2BE2, 0 0 60px #8A2BE2;
            --neon-glow-cyan: 0 0 20px #00FFFF, 0 0 40px #00FFFF, 0 0 60px #00FFFF;
            --neon-glow-mixed: 0 0 15px #8A2BE2, 0 0 30px #00FFFF, 0 0 50px #8A2BE2;
        }

        body {
            font-family: 'Exo 2', 'Orbitron', sans-serif;
            background: 
                radial-gradient(circle at 20% 80%, rgba(138, 43, 226, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                linear-gradient(135deg, #0A0A0F 0%, #1A0F2A 50%, #0A0A0F 100%);
            color: #E0E0FF;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Lightning Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, transparent 20%, rgba(138, 43, 226, 0.1) 25%, transparent 30%),
                radial-gradient(circle at 70% 70%, transparent 20%, rgba(0, 255, 255, 0.1) 25%, transparent 30%),
                radial-gradient(circle at 10% 90%, transparent 20%, rgba(138, 43, 226, 0.08) 25%, transparent 30%);
            animation: lightning 8s infinite ease-in-out;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238A2BE2' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300FFFF' fill-opacity='0.02'%3E%3Ccircle cx='20' cy='20' r='1.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: surge 12s infinite linear;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes lightning {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        @keyframes surge {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(20px, 20px) rotate(360deg); }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: double 3px transparent;
            background-image: linear-gradient(#0A0A0F, #0A0A0F),
                              linear-gradient(90deg, var(--electric-purple), var(--cyan-blue));
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: var(--neon-glow-purple);
            z-index: 1000;
            padding: 1rem 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Logo Container with Rotating Rings */
        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--neon-glow-cyan);
            z-index: 2;
            position: relative;
        }

        /* Rotating Neon Rings */
        .ring {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        .ring-1 {
            width: 70px;
            height: 70px;
            border-image: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple)) 1;
            animation-duration: 12s;
            box-shadow: var(--neon-glow-cyan);
        }

        .ring-2 {
            width: 90px;
            height: 90px;
            border-image: linear-gradient(-45deg, var(--electric-purple), var(--cyan-blue)) 1;
            animation-duration: 16s;
            animation-direction: reverse;
            box-shadow: var(--neon-glow-purple);
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #E0E0FF;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--cyan-blue);
            text-shadow: var(--neon-glow-cyan);
            background: rgba(138, 43, 226, 0.1);
            box-shadow: var(--neon-glow-purple);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple));
            margin: 3px 0;
            border-radius: 2px;
            box-shadow: var(--neon-glow-cyan);
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            background: var(--panel-bg);
            padding: 4rem 3rem;
            border-radius: 30px;
            border: double 4px transparent;
            background-image: linear-gradient(var(--panel-bg), var(--panel-bg)),
                              linear-gradient(45deg, var(--electric-purple), var(--cyan-blue));
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: var(--neon-glow-mixed);
            backdrop-filter: blur(20px);
            max-width: 800px;
            position: relative;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: var(--neon-glow-purple); }
            100% { box-shadow: var(--neon-glow-cyan), 0 0 80px rgba(138, 43, 226, 0.5); }
        }

        .hero-content h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple), var(--cyan-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--neon-glow-mixed);
            letter-spacing: 3px;
        }

        .hero-content p {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            margin-bottom: 2rem;
            opacity: 0.95;
            line-height: 1.6;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, var(--electric-purple), var(--cyan-blue));
            color: #fff;
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            box-shadow: var(--neon-glow-mixed);
            transition: all 0.4s ease;
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
        }

        .cta-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                0 0 30px var(--electric-purple),
                0 0 60px var(--cyan-blue),
                0 0 100px var(--electric-purple);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 
                0 0 30px var(--electric-purple),
                0 0 60px var(--cyan-blue),
                0 0 100px var(--electric-purple); }
            50% { box-shadow: 
                0 0 40px var(--electric-purple),
                0 0 80px var(--cyan-blue),
                0 0 120px var(--electric-purple); }
        }

        /* Sections */
        section {
            padding: 120px 0;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        h2 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 5vw, 4rem);
            text-align: center;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--neon-glow-mixed);
            letter-spacing: 2px;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--cyan-blue), var(--electric-purple));
            box-shadow: var(--neon-glow-cyan);
            border-radius: 2px;
        }

        /* Panel Style for Sections */
        .section-panel {
            background: var(--panel-bg);
            border-radius: 25px;
            padding: 3rem;
            border: double 3px transparent;
            background-image: linear-gradient(var(--panel-bg), var(--panel-bg)),
                              linear-gradient(45deg, var(--electric-purple), var(--cyan-blue));
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: var(--neon-glow-mixed);
            backdrop-filter: blur(20px);
            margin-bottom: 2rem;
        }

        /* About Section */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-text {
            font-size: 1.2rem;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .about-features {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            background: rgba(138, 43, 226, 0.1);
            border-radius: 15px;
            border-left: 4px solid var(--cyan-blue);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
            transition: all 0.3s ease;
        }

        .feature:hover {
            box-shadow: var(--neon-glow-purple);
            transform: translateX(10px);
        }

        .feature i {
            font-size: 1.8rem;
            background: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            width: 45px;
            text-shadow: none;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(138, 43, 226, 0.15), rgba(0, 255, 255, 0.1));
            padding: 3rem 2rem;
            text-align: center;
            border-radius: 25px;
            border: double 2px transparent;
            background-image: linear-gradient(rgba(138, 43, 226, 0.15), rgba(0, 255, 255, 0.1)),
                              linear-gradient(45deg, var(--electric-purple), var(--cyan-blue));
            background-origin: border-box;
            background-clip: content-box, border-box;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan-blue), var(--electric-purple));
            box-shadow: 0 0 15px var(--cyan-blue);
        }

        .stat-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: var(--neon-glow-mixed);
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--cyan-blue), var(--electric-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            text-shadow: var(--neon-glow-cyan);
        }

        .stat-label {
            font-size: 1.2rem;
            opacity: 0.95;
            margin-top: 1rem;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }

        /* Portfolio Section */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .portfolio-item {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            background: var(--panel-bg);
            border: double 3px transparent;
            background-image: linear-gradient(var(--panel-bg), var(--panel-bg)),
                              linear-gradient(45deg, var(--electric-purple), var(--cyan-blue));
            background
